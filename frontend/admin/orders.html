<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopVN - Quản lý đơn hàng</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-admin sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/admin/index.html"><i class="bi bi-speedometer2"></i> ShopVN Admin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <li class="nav-item"><a class="nav-link" href="/admin/index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/admin/products.html">Sản phẩm</a></li>
          <li class="nav-item"><a class="nav-link active" href="/admin/orders.html">Đơn hàng</a></li>
          <li class="nav-item"><a class="nav-link" href="/index.html"><i class="bi bi-shop"></i> Xem cửa hàng</a></li>
          <li class="nav-item"><a class="nav-link" href="#" id="nav-logout"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a></li>
          <li class="nav-item">
            <button id="theme-toggle-btn" class="theme-toggle-btn"><i class="bi bi-moon-stars" id="theme-icon"></i></button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h3 class="section-title"><i class="bi bi-receipt"></i> Quản lý đơn hàng</h3>

    <div id="alert-box" class="alert d-none"></div>

    <div id="loading" class="spinner-wrap">
      <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div class="card p-3">
      <div class="table-responsive">
        <table class="table table-dark-theme align-middle">
          <thead>
            <tr>
              <th>Mã đơn</th>
              <th>Khách hàng</th>
              <th>Sản phẩm</th>
              <th>Tổng tiền</th>
              <th>Thanh toán</th>
              <th>Trạng thái thanh toán</th>
              <th>Trạng thái đơn hàng</th>
              <th>Ngày đặt</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="order-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    protectAdminPage();

    document.getElementById('nav-logout').addEventListener('click', (e) => {
      e.preventDefault();
      logout();
    });

    const statusOptions = ['pending', 'processing', 'shipped', 'delivered', 'cancelled'];
    const statusLabels = {
      pending: 'Chờ xử lý',
      processing: 'Đang xử lý',
      shipped: 'Đang giao',
      delivered: 'Đã giao',
      cancelled: 'Đã hủy'
    };

    function showAlert(message, type) {
      const box = document.getElementById('alert-box');
      box.textContent = message;
      box.className = `alert alert-${type}`;
      setTimeout(() => box.classList.add('d-none'), 4000);
    }

    async function loadOrders() {
      try {
        const orders = await apiGet('/orders/all');
        renderTable(orders);
      } catch (error) {
        showAlert(error.message, 'danger');
      } finally {
        document.getElementById('loading').classList.add('d-none');
      }
    }

    function renderTable(orders) {
      const tbody = document.getElementById('order-table-body');

      if (orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="text-center">Chưa có đơn hàng nào</td></tr>';
        return;
      }

      tbody.innerHTML = orders.map(order => `
        <tr>
          <td>#${order._id.slice(-8).toUpperCase()}</td>
          <td>${order.user ? order.user.name : 'N/A'}<br><small class="text-muted">${order.user ? order.user.email : ''}</small></td>
          <td>
            ${order.orderItems.map(item => `<div class="small">${item.name} x${item.qty}</div>`).join('')}
          </td>
          <td class="fw-bold">${formatCurrency(order.totalPrice)}</td>
          <td>${order.paymentMethod === 'cod' ? 'COD' : 'VietQR'}</td>
          <td>
            <span class="badge ${order.isPaid ? 'bg-success' : 'bg-secondary'}">${order.isPaid ? 'Đã thanh toán' : 'Chưa thanh toán'}</span>
          </td>
          <td>
            <select class="form-select form-select-sm" onchange="updateStatus('${order._id}', this.value)">
              ${statusOptions.map(s => `<option value="${s}" ${order.status === s ? 'selected' : ''}>${statusLabels[s]}</option>`).join('')}
            </select>
          </td>
          <td><small>${new Date(order.createdAt).toLocaleString('vi-VN')}</small></td>
          <td>
            ${!order.isPaid ? `<button class="btn btn-sm btn-success" onclick="confirmPaid('${order._id}')"><i class="bi bi-check-circle"></i> Xác nhận đã thanh toán</button>` : ''}
          </td>
        </tr>
      `).join('');
    }

    async function updateStatus(orderId, status) {
      try {
        await apiPut(`/orders/${orderId}/status`, { status });
        showAlert('Đã cập nhật trạng thái đơn hàng', 'success');
        loadOrders();
      } catch (error) {
        showAlert(error.message, 'danger');
        loadOrders();
      }
    }

    async function confirmPaid(orderId) {
      if (!confirm('Xác nhận đơn hàng này đã được thanh toán? Hệ thống sẽ tự động trừ kho sản phẩm.')) return;

      try {
        await apiPut(`/orders/${orderId}/pay`, {});
        showAlert('Đã xác nhận thanh toán và cập nhật kho sản phẩm', 'success');
        loadOrders();
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    }

    loadOrders();
  </script>
</body>
</html>
