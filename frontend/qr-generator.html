<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopVN - Tạo mã QR thanh toán</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/index.html"><i class="bi bi-shop"></i> ShopVN</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <li class="nav-item"><a class="nav-link" href="/index.html">Trang chủ</a></li>
          <li class="nav-item"><a class="nav-link active" href="/qr-generator.html">Tạo QR</a></li>
          <li class="nav-item">
            <a class="nav-link position-relative" href="/cart.html">
              <i class="bi bi-cart3"></i> Giỏ hàng
              <span id="cart-badge" class="badge bg-danger position-absolute top-0 start-100 translate-middle rounded-pill d-none">0</span>
            </a>
          </li>
          <li class="nav-item d-none" id="nav-admin"><a class="nav-link" href="/admin/index.html"><i class="bi bi-speedometer2"></i> Admin</a></li>
          <li class="nav-item d-none" id="nav-profile"><a class="nav-link" href="/profile.html"><i class="bi bi-person-circle"></i> <span id="nav-user-name"></span></a></li>
          <li class="nav-item" id="nav-login"><a class="nav-link" href="/login.html">Đăng nhập</a></li>
          <li class="nav-item" id="nav-register"><a class="nav-link" href="/register.html">Đăng ký</a></li>
          <li class="nav-item d-none" id="nav-logout"><a class="nav-link" href="#"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a></li>
          <li class="nav-item">
            <button id="theme-toggle-btn" class="theme-toggle-btn"><i class="bi bi-moon-stars" id="theme-icon"></i></button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h3 class="section-title"><i class="bi bi-qr-code"></i> Tạo mã QR chuyển khoản (VietQR)</h3>

    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card p-4">
          <div class="mb-3">
            <label class="form-label">Số tiền (VNĐ)</label>
            <input type="number" id="amount-input" class="form-control" placeholder="Ví dụ: 100000" min="0">
          </div>
          <div class="mb-3">
            <label class="form-label">Nội dung chuyển khoản</label>
            <input type="text" id="description-input" class="form-control" placeholder="Ví dụ: Thanh toan don hang">
          </div>
          <button class="btn btn-primary w-100" id="generate-btn">
            <i class="bi bi-qr-code-scan"></i> Tạo mã QR
          </button>
        </div>
      </div>

      <div class="col-md-5" id="result-section" style="display:none;">
        <div class="card">
          <div class="card-body qr-box">
            <h5 class="fw-bold mb-3">Quét mã để chuyển khoản</h5>
            <img id="qr-image" src="" alt="QR Code">
            <div class="mt-3 text-start">
              <p class="mb-1"><strong>Ngân hàng:</strong> Techcombank</p>
              <p class="mb-1"><strong>Số tài khoản:</strong> <span id="result-account-no"></span></p>
              <p class="mb-1"><strong>Chủ tài khoản:</strong> <span id="result-account-name"></span></p>
              <p class="mb-1"><strong>Số tiền:</strong> <span id="result-amount"></span></p>
              <p class="mb-1"><strong>Nội dung:</strong> <span id="result-description"></span></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="alert-box" class="alert alert-danger d-none mt-3"></div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.getElementById('generate-btn').addEventListener('click', async () => {
      const amount = document.getElementById('amount-input').value;
      const description = document.getElementById('description-input').value;
      const alertBox = document.getElementById('alert-box');
      alertBox.classList.add('d-none');

      if (!amount || amount <= 0) {
        alertBox.textContent = 'Vui lòng nhập số tiền hợp lệ';
        alertBox.classList.remove('d-none');
        return;
      }

      try {
        const data = await apiGet(`/qr/vietqr-info?amount=${amount}&description=${encodeURIComponent(description)}`);

        document.getElementById('qr-image').src = data.qrUrl;
        document.getElementById('result-account-no').textContent = data.accountNo;
        document.getElementById('result-account-name').textContent = data.accountName;
        document.getElementById('result-amount').textContent = formatCurrency(data.amount);
        document.getElementById('result-description').textContent = data.description || '(Không có)';

        document.getElementById('result-section').style.display = 'block';
      } catch (error) {
        alertBox.textContent = error.message;
        alertBox.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
