<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopVN - Đăng nhập</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/index.html"><i class="bi bi-shop"></i> ShopVN</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <li class="nav-item"><a class="nav-link" href="/index.html">Trang chủ</a></li>
          <li class="nav-item">
            <button id="theme-toggle-btn" class="theme-toggle-btn"><i class="bi bi-moon-stars" id="theme-icon"></i></button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card p-4">
          <h3 class="text-center mb-4 fw-bold"><i class="bi bi-box-arrow-in-right"></i> Đăng nhập</h3>

          <div id="alert-box" class="alert alert-danger d-none" role="alert"></div>
          <div id="success-box" class="alert alert-success d-none" role="alert"></div>

          <!-- Bước 1: Email + Mật khẩu -->
          <div id="step1">
            <form id="login-form">
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" class="form-control" id="password" required>
              </div>
              <button type="submit" class="btn btn-primary w-100" id="btn-send-otp">
                Gửi mã OTP
              </button>
            </form>
          </div>

          <!-- Bước 2: Nhập OTP -->
          <div id="step2" class="d-none">
            <p class="text-center text-muted">Mã OTP đã được gửi về email của bạn</p>
            <form id="otp-form">
              <div class="mb-3">
                <label class="form-label">Nhập mã OTP (6 số)</label>
                <input type="text" class="form-control text-center fs-4 fw-bold" id="otp" maxlength="6" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Xác nhận đăng nhập</button>
              <button type="button" class="btn btn-outline-secondary w-100 mt-2" id="btn-resend">Gửi lại mã</button>
            </form>
          </div>

          <p class="text-center mt-3 mb-0">
            Chưa có tài khoản? <a href="/register.html">Đăng ký ngay</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let currentEmail = '';
    let currentPassword = '';

    const alertBox = document.getElementById('alert-box');
    const successBox = document.getElementById('success-box');

    function showError(msg) {
      alertBox.textContent = msg;
      alertBox.classList.remove('d-none');
      successBox.classList.add('d-none');
    }

    function showSuccess(msg) {
      successBox.textContent = msg;
      successBox.classList.remove('d-none');
      alertBox.classList.add('d-none');
    }

    // Bước 1: Gửi OTP
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      currentEmail = document.getElementById('email').value;
      currentPassword = document.getElementById('password').value;
      const btn = document.getElementById('btn-send-otp');
      btn.disabled = true;
      btn.textContent = 'Đang gửi...';

      try {
        await apiPost('/auth/send-otp', { email: currentEmail, password: currentPassword });
        showSuccess('Mã OTP đã gửi về ' + currentEmail);
        document.getElementById('step1').classList.add('d-none');
        document.getElementById('step2').classList.remove('d-none');
      } catch (error) {
        showError(error.message);
        btn.disabled = false;
        btn.textContent = 'Gửi mã OTP';
      }
    });

    // Bước 2: Xác nhận OTP
    document.getElementById('otp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const otp = document.getElementById('otp').value;

      try {
        const data = await apiPost('/auth/login', { email: currentEmail, otp });
        saveAuth(data);
        if (data.role === 'admin') {
          window.location.href = '/admin/index.html';
        } else {
          window.location.href = '/index.html';
        }
      } catch (error) {
        showError(error.message);
      }
    });

    // Gửi lại OTP
    document.getElementById('btn-resend').addEventListener('click', async () => {
      try {
        await apiPost('/auth/send-otp', { email: currentEmail, password: currentPassword });
        showSuccess('Đã gửi lại mã OTP về ' + currentEmail);
      } catch (error) {
        showError(error.message);
      }
    });
  </script>
</body>
</html>
