<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopVN - Chi tiết sản phẩm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/index.html"><i class="bi bi-shop"></i> ShopVN</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <li class="nav-item"><a class="nav-link" href="/index.html">Trang chủ</a></li>
          <li class="nav-item"><a class="nav-link" href="/qr-generator.html">Tạo QR</a></li>
          <li class="nav-item">
            <a class="nav-link position-relative" href="/cart.html">
              <i class="bi bi-cart3"></i> Giỏ hàng
              <span id="cart-badge" class="badge bg-danger position-absolute top-0 start-100 translate-middle rounded-pill d-none">0</span>
            </a>
          </li>
          <li class="nav-item d-none" id="nav-admin"><a class="nav-link" href="/admin/index.html"><i class="bi bi-speedometer2"></i> Admin</a></li>
          <li class="nav-item d-none" id="nav-profile"><a class="nav-link" href="/profile.html"><i class="bi bi-person-circle"></i> <span id="nav-user-name"></span></a></li>
          <li class="nav-item" id="nav-login"><a class="nav-link" href="/login.html">Đăng nhập</a></li>
          <li class="nav-item" id="nav-register"><a class="nav-link" href="/register.html">Đăng ký</a></li>
          <li class="nav-item d-none" id="nav-logout"><a class="nav-link" href="#"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a></li>
          <li class="nav-item">
            <button id="theme-toggle-btn" class="theme-toggle-btn"><i class="bi bi-moon-stars" id="theme-icon"></i></button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <a href="/index.html" class="btn btn-outline-secondary mb-3"><i class="bi bi-arrow-left"></i> Quay lại</a>

    <div id="loading" class="spinner-wrap">
      <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div id="product-detail" class="row d-none">
      <div class="col-md-5">
        <div class="card">
          <img id="product-image" src="" class="card-img-top" alt="" style="object-fit: cover; max-height: 450px;">
        </div>
      </div>
      <div class="col-md-7">
        <div class="card p-4">
          <h2 id="product-name" class="fw-bold"></h2>
          <p class="text-muted" id="product-category"></p>
          <h3 class="price-tag" id="product-price"></h3>
          <p id="product-description" class="mt-3"></p>
          <p id="product-stock" class="text-muted"></p>

          <div class="d-flex align-items-center gap-2 mt-3">
            <label class="form-label mb-0">Số lượng:</label>
            <input type="number" id="qty-input" class="form-control" value="1" min="1" style="width: 100px;">
          </div>

          <button id="add-to-cart-btn" class="btn btn-primary mt-3">
            <i class="bi bi-cart-plus"></i> Thêm vào giỏ hàng
          </button>
        </div>
      </div>
    </div>

    <div id="error-box" class="alert alert-danger d-none"></div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    let currentProduct = null;

    function getProductIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    async function loadProduct() {
      const id = getProductIdFromUrl();

      if (!id) {
        showError('Không tìm thấy sản phẩm');
        return;
      }

      try {
        currentProduct = await apiGet(`/products/${id}`);
        renderProduct(currentProduct);
      } catch (error) {
        showError(error.message);
      } finally {
        document.getElementById('loading').classList.add('d-none');
      }
    }

    function renderProduct(p) {
      document.getElementById('product-image').src = p.image;
      document.getElementById('product-image').alt = p.name;
      document.getElementById('product-name').textContent = p.name;
      document.getElementById('product-category').textContent = `Danh mục: ${p.category}`;
      document.getElementById('product-price').textContent = formatCurrency(p.price);
      document.getElementById('product-description').textContent = p.description;
      document.getElementById('product-stock').textContent = `Còn ${p.countInStock} sản phẩm trong kho`;

      document.getElementById('qty-input').max = p.countInStock || 1;

      document.getElementById('product-detail').classList.remove('d-none');
    }

    function showError(message) {
      const box = document.getElementById('error-box');
      box.textContent = message;
      box.classList.remove('d-none');
    }

    document.getElementById('add-to-cart-btn').addEventListener('click', () => {
      const qty = parseInt(document.getElementById('qty-input').value) || 1;

      if (!currentProduct) return;

      addToCart({
        product: currentProduct._id,
        name: currentProduct.name,
        price: currentProduct.price,
        image: currentProduct.image
      }, qty);

      alert('Đã thêm vào giỏ hàng!');
    });

    loadProduct();
  </script>
</body>
</html>
