<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopVN - Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-admin sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/admin/index.html"><i class="bi bi-speedometer2"></i> ShopVN Admin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <li class="nav-item"><a class="nav-link" href="/admin/index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/admin/products.html">Sản phẩm</a></li>
          <li class="nav-item"><a class="nav-link" href="/admin/orders.html">Đơn hàng</a></li>
          <li class="nav-item"><a class="nav-link" href="/index.html"><i class="bi bi-shop"></i> Xem cửa hàng</a></li>
          <li class="nav-item"><a class="nav-link" href="#" id="nav-logout"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a></li>
          <li class="nav-item">
            <button id="theme-toggle-btn" class="theme-toggle-btn"><i class="bi bi-moon-stars" id="theme-icon"></i></button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h3 class="section-title"><i class="bi bi-speedometer2"></i> Bảng điều khiển Admin</h3>

    <div class="row g-4 mt-2">
      <div class="col-md-6">
        <a href="/admin/products.html" class="text-decoration-none">
          <div class="card p-4 text-center">
            <i class="bi bi-box-seam" style="font-size: 3rem; color: var(--primary-color);"></i>
            <h4 class="fw-bold mt-3">Quản lý sản phẩm</h4>
            <p class="text-muted">Thêm, sửa, xóa sản phẩm trong cửa hàng</p>
          </div>
        </a>
      </div>
      <div class="col-md-6">
        <a href="/admin/orders.html" class="text-decoration-none">
          <div class="card p-4 text-center">
            <i class="bi bi-receipt" style="font-size: 3rem; color: var(--primary-color);"></i>
            <h4 class="fw-bold mt-3">Quản lý đơn hàng</h4>
            <p class="text-muted">Xem và cập nhật trạng thái đơn hàng</p>
          </div>
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    protectAdminPage();

    document.getElementById('nav-logout').addEventListener('click', (e) => {
      e.preventDefault();
      logout();
    });
  </script>
</body>
</html>
