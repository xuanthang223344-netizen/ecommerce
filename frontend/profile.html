<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopVN - Tài khoản của tôi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/index.html"><i class="bi bi-shop"></i> ShopVN</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <li class="nav-item"><a class="nav-link" href="/index.html">Trang chủ</a></li>
          <li class="nav-item"><a class="nav-link" href="/qr-generator.html">Tạo QR</a></li>
          <li class="nav-item">
            <a class="nav-link position-relative" href="/cart.html">
              <i class="bi bi-cart3"></i> Giỏ hàng
              <span id="cart-badge" class="badge bg-danger position-absolute top-0 start-100 translate-middle rounded-pill d-none">0</span>
            </a>
          </li>
          <li class="nav-item d-none" id="nav-admin"><a class="nav-link" href="/admin/index.html"><i class="bi bi-speedometer2"></i> Admin</a></li>
          <li class="nav-item d-none" id="nav-profile"><a class="nav-link" href="/profile.html"><i class="bi bi-person-circle"></i> <span id="nav-user-name"></span></a></li>
          <li class="nav-item" id="nav-login"><a class="nav-link" href="/login.html">Đăng nhập</a></li>
          <li class="nav-item" id="nav-register"><a class="nav-link" href="/register.html">Đăng ký</a></li>
          <li class="nav-item d-none" id="nav-logout"><a class="nav-link" href="#"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a></li>
          <li class="nav-item">
            <button id="theme-toggle-btn" class="theme-toggle-btn"><i class="bi bi-moon-stars" id="theme-icon"></i></button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h3 class="section-title"><i class="bi bi-person-circle"></i> Tài khoản của tôi</h3>

    <div class="row">
      <div class="col-md-4 mb-4">
        <div class="card p-4">
          <h5 class="fw-bold mb-3">Thông tin cá nhân</h5>
          <p class="mb-1"><strong>Họ tên:</strong> <span id="profile-name"></span></p>
          <p class="mb-1"><strong>Email:</strong> <span id="profile-email"></span></p>
          <p class="mb-1"><strong>Vai trò:</strong> <span id="profile-role"></span></p>
        </div>
      </div>
      <div class="col-md-8">
        <h5 class="fw-bold mb-3">Lịch sử đơn hàng</h5>
        <div id="loading" class="spinner-wrap">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
        <div id="orders-container"></div>
      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    protectPage();

    const statusLabels = {
      pending: 'Chờ xử lý',
      processing: 'Đang xử lý',
      shipped: 'Đang giao',
      delivered: 'Đã giao',
      cancelled: 'Đã hủy'
    };

    const statusColors = {
      pending: 'warning',
      processing: 'info',
      shipped: 'primary',
      delivered: 'success',
      cancelled: 'danger'
    };

    async function loadProfile() {
      try {
        const profile = await apiGet('/auth/profile');
        document.getElementById('profile-name').textContent = profile.name;
        document.getElementById('profile-email').textContent = profile.email;
        document.getElementById('profile-role').textContent = profile.role === 'admin' ? 'Quản trị viên' : 'Khách hàng';
      } catch (error) {
        alert('Vui lòng đăng nhập lại');
        logout();
      }
    }

    async function loadOrders() {
      try {
        const orders = await apiGet('/orders/myorders');
        renderOrders(orders);
      } catch (error) {
        document.getElementById('orders-container').innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
      } finally {
        document.getElementById('loading').classList.add('d-none');
      }
    }

    function renderOrders(orders) {
      const container = document.getElementById('orders-container');

      if (orders.length === 0) {
        container.innerHTML = '<div class="alert alert-info">Bạn chưa có đơn hàng nào.</div>';
        return;
      }

      container.innerHTML = orders.map(order => `
        <div class="card p-3 mb-3">
          <div class="d-flex justify-content-between flex-wrap mb-2">
            <div>
              <strong>Mã đơn:</strong> #${order._id.slice(-8).toUpperCase()}
              <br>
              <small class="text-muted">${new Date(order.createdAt).toLocaleString('vi-VN')}</small>
            </div>
            <div class="text-end">
              <span class="badge bg-${statusColors[order.status]} badge-status">${statusLabels[order.status]}</span>
              <br>
              <span class="badge ${order.isPaid ? 'bg-success' : 'bg-secondary'} mt-1">${order.isPaid ? 'Đã thanh toán' : 'Chưa thanh toán'}</span>
            </div>
          </div>
          <hr>
          ${order.orderItems.map(item => `
            <div class="d-flex justify-content-between small mb-1">
              <span>${item.name} x${item.qty}</span>
              <span>${formatCurrency(item.price * item.qty)}</span>
            </div>
          `).join('')}
          <hr>
          <div class="d-flex justify-content-between fw-bold">
            <span>Tổng tiền:</span>
            <span class="price-tag">${formatCurrency(order.totalPrice)}</span>
          </div>
          <div class="small text-muted mt-2">
            <i class="bi bi-geo-alt"></i> ${order.shippingAddress.address}, ${order.shippingAddress.city}
          </div>
          <div class="small text-muted">
            <i class="bi bi-credit-card"></i> ${order.paymentMethod === 'cod' ? 'Thanh toán khi nhận hàng' : 'Chuyển khoản VietQR'}
          </div>
        </div>
      `).join('');
    }

    loadProfile();
    loadOrders();
  </script>
</body>
</html>
