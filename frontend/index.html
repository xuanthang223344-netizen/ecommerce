<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopVN - Trang chủ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/index.html"><i class="bi bi-shop"></i> ShopVN</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <li class="nav-item"><a class="nav-link" href="/index.html">Trang chủ</a></li>
          <li class="nav-item"><a class="nav-link" href="/qr-generator.html">Tạo QR</a></li>
          <li class="nav-item">
            <a class="nav-link position-relative" href="/cart.html">
              <i class="bi bi-cart3"></i> Giỏ hàng
              <span id="cart-badge" class="badge bg-danger position-absolute top-0 start-100 translate-middle rounded-pill d-none">0</span>
            </a>
          </li>
          <li class="nav-item d-none" id="nav-admin"><a class="nav-link" href="/admin/index.html"><i class="bi bi-speedometer2"></i> Admin</a></li>
          <li class="nav-item d-none" id="nav-profile"><a class="nav-link" href="/profile.html"><i class="bi bi-person-circle"></i> <span id="nav-user-name"></span></a></li>
          <li class="nav-item" id="nav-login"><a class="nav-link" href="/login.html">Đăng nhập</a></li>
          <li class="nav-item" id="nav-register"><a class="nav-link" href="/register.html">Đăng ký</a></li>
          <li class="nav-item d-none" id="nav-logout"><a class="nav-link" href="#"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a></li>
          <li class="nav-item">
            <button id="theme-toggle-btn" class="theme-toggle-btn"><i class="bi bi-moon-stars" id="theme-icon"></i></button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <div class="container mt-4">
    <div class="card hero-banner mb-4">
      <h1 class="fw-bold">Chào mừng đến với ShopVN</h1>
      <p class="mb-0">Mua sắm dễ dàng - Giao hàng nhanh chóng - Thanh toán linh hoạt</p>
    </div>

    <h3 class="section-title">Sản phẩm nổi bật</h3>

    <!-- Filter -->
    <div class="row mb-3">
      <div class="col-md-6 mb-2">
        <input type="text" id="search-input" class="form-control" placeholder="Tìm kiếm sản phẩm...">
      </div>
      <div class="col-md-6 mb-2">
        <select id="category-filter" class="form-select">
          <option value="">Tất cả danh mục</option>
        </select>
      </div>
    </div>

    <div id="loading" class="spinner-wrap">
      <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div class="row g-4" id="product-list"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    let allProducts = [];

    async function loadProducts() {
      try {
        allProducts = await apiGet('/products');
        renderCategories();
        renderProducts(allProducts);
      } catch (error) {
        document.getElementById('product-list').innerHTML = `<div class="col-12"><div class="alert alert-danger">Lỗi tải sản phẩm: ${error.message}</div></div>`;
      } finally {
        document.getElementById('loading').classList.add('d-none');
      }
    }

    function renderCategories() {
      const categories = [...new Set(allProducts.map(p => p.category))];
      const select = document.getElementById('category-filter');
      categories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        select.appendChild(option);
      });
    }

    function renderProducts(products) {
      const container = document.getElementById('product-list');

      if (products.length === 0) {
        container.innerHTML = '<div class="col-12"><div class="alert alert-info">Không có sản phẩm nào.</div></div>';
        return;
      }

      container.innerHTML = products.map(p => `
        <div class="col-sm-6 col-md-4 col-lg-3">
          <div class="card product-card" onclick="goToProduct('${p._id}')">
            <img src="${p.image}" class="card-img-top" alt="${p.name}">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">${p.name}</h5>
              <p class="card-text text-muted small flex-grow-1">${truncate(p.description, 60)}</p>
              <p class="price-tag">${formatCurrency(p.price)}</p>
              <p class="small text-muted mb-2">Còn ${p.countInStock} sản phẩm</p>
              <button class="btn btn-primary w-100" onclick="event.stopPropagation(); quickAddToCart('${p._id}', '${escapeStr(p.name)}', ${p.price}, '${p.image}')">
                <i class="bi bi-cart-plus"></i> Thêm vào giỏ
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function truncate(text, length) {
      if (!text) return '';
      return text.length > length ? text.substring(0, length) + '...' : text;
    }

    function escapeStr(str) {
      return (str || '').replace(/'/g, "\\'");
    }

    function goToProduct(id) {
      window.location.href = `/product.html?id=${id}`;
    }

    function quickAddToCart(id, name, price, image) {
      addToCart({ product: id, name, price, image }, 1);
      alert('Đã thêm vào giỏ hàng!');
    }

    document.getElementById('search-input').addEventListener('input', filterProducts);
    document.getElementById('category-filter').addEventListener('change', filterProducts);

    function filterProducts() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const category = document.getElementById('category-filter').value;

      let filtered = allProducts;

      if (search) {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(search));
      }

      if (category) {
        filtered = filtered.filter(p => p.category === category);
      }

      renderProducts(filtered);
    }

    loadProducts();
  </script>
</body>
</html>
