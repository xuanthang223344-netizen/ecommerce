<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopVN - Quản lý sản phẩm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-admin sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/admin/index.html"><i class="bi bi-speedometer2"></i> ShopVN Admin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <li class="nav-item"><a class="nav-link" href="/admin/index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="/admin/products.html">Sản phẩm</a></li>
          <li class="nav-item"><a class="nav-link" href="/admin/orders.html">Đơn hàng</a></li>
          <li class="nav-item"><a class="nav-link" href="/index.html"><i class="bi bi-shop"></i> Xem cửa hàng</a></li>
          <li class="nav-item"><a class="nav-link" href="#" id="nav-logout"><i class="bi bi-box-arrow-right"></i> Đăng xuất</a></li>
          <li class="nav-item">
            <button id="theme-toggle-btn" class="theme-toggle-btn"><i class="bi bi-moon-stars" id="theme-icon"></i></button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h3 class="section-title"><i class="bi bi-box-seam"></i> Quản lý sản phẩm</h3>

    <!-- Product form -->
    <div class="card p-4 mb-4">
      <h5 class="fw-bold mb-3" id="form-title">Thêm sản phẩm mới</h5>
      <input type="hidden" id="product-id">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Tên sản phẩm</label>
          <input type="text" class="form-control" id="name" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Danh mục</label>
          <input type="text" class="form-control" id="category" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Giá (VNĐ)</label>
          <input type="number" class="form-control" id="price" min="0" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Số lượng trong kho</label>
          <input type="number" class="form-control" id="countInStock" min="0" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">URL hình ảnh</label>
          <input type="text" class="form-control" id="image" placeholder="https://...">
        </div>
        <div class="col-12">
          <label class="form-label">Mô tả</label>
          <textarea class="form-control" id="description" rows="3"></textarea>
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-primary" id="save-btn"><i class="bi bi-save"></i> Lưu sản phẩm</button>
        <button class="btn btn-secondary d-none" id="cancel-btn"><i class="bi bi-x-circle"></i> Hủy</button>
      </div>
    </div>

    <div id="alert-box" class="alert d-none"></div>

    <!-- Product table -->
    <div class="card p-3">
      <div class="table-responsive">
        <table class="table table-dark-theme align-middle">
          <thead>
            <tr>
              <th>Hình ảnh</th>
              <th>Tên sản phẩm</th>
              <th>Danh mục</th>
              <th>Giá</th>
              <th>Kho</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="product-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    protectAdminPage();

    document.getElementById('nav-logout').addEventListener('click', (e) => {
      e.preventDefault();
      logout();
    });

    let editingId = null;

    async function loadProducts() {
      try {
        const products = await apiGet('/products');
        renderTable(products);
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    }

    function renderTable(products) {
      const tbody = document.getElementById('product-table-body');

      if (products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center">Chưa có sản phẩm nào</td></tr>';
        return;
      }

      tbody.innerHTML = products.map(p => `
        <tr>
          <td><img src="${p.image}" alt="${p.name}" style="width: 60px; height: 60px; object-fit: cover; border-radius: 8px;"></td>
          <td>${p.name}</td>
          <td>${p.category}</td>
          <td>${formatCurrency(p.price)}</td>
          <td>${p.countInStock}</td>
          <td>
            <button class="btn btn-sm btn-outline-primary me-1" onclick="editProduct('${p._id}')"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct('${p._id}')"><i class="bi bi-trash"></i></button>
          </td>
        </tr>
      `).join('');
    }

    function showAlert(message, type) {
      const box = document.getElementById('alert-box');
      box.textContent = message;
      box.className = `alert alert-${type}`;
      setTimeout(() => box.classList.add('d-none'), 4000);
    }

    function clearForm() {
      editingId = null;
      document.getElementById('product-id').value = '';
      document.getElementById('name').value = '';
      document.getElementById('category').value = '';
      document.getElementById('price').value = '';
      document.getElementById('countInStock').value = '';
      document.getElementById('image').value = '';
      document.getElementById('description').value = '';
      document.getElementById('form-title').textContent = 'Thêm sản phẩm mới';
      document.getElementById('cancel-btn').classList.add('d-none');
    }

    async function editProduct(id) {
      try {
        const product = await apiGet(`/products/${id}`);
        editingId = id;
        document.getElementById('product-id').value = id;
        document.getElementById('name').value = product.name;
        document.getElementById('category').value = product.category;
        document.getElementById('price').value = product.price;
        document.getElementById('countInStock').value = product.countInStock;
        document.getElementById('image').value = product.image;
        document.getElementById('description').value = product.description;
        document.getElementById('form-title').textContent = 'Sửa sản phẩm';
        document.getElementById('cancel-btn').classList.remove('d-none');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    }

    async function deleteProduct(id) {
      if (!confirm('Bạn có chắc muốn xóa sản phẩm này?')) return;

      try {
        await apiDelete(`/products/${id}`);
        showAlert('Đã xóa sản phẩm thành công', 'success');
        loadProducts();
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    }

    document.getElementById('save-btn').addEventListener('click', async () => {
      const productData = {
        name: document.getElementById('name').value.trim(),
        category: document.getElementById('category').value.trim(),
        price: parseFloat(document.getElementById('price').value) || 0,
        countInStock: parseInt(document.getElementById('countInStock').value) || 0,
        image: document.getElementById('image').value.trim() || 'https://via.placeholder.com/300x300?text=No+Image',
        description: document.getElementById('description').value.trim()
      };

      if (!productData.name || !productData.category) {
        showAlert('Vui lòng điền đầy đủ thông tin bắt buộc', 'danger');
        return;
      }

      try {
        if (editingId) {
          await apiPut(`/products/${editingId}`, productData);
          showAlert('Đã cập nhật sản phẩm thành công', 'success');
        } else {
          await apiPost('/products', productData);
          showAlert('Đã thêm sản phẩm thành công', 'success');
        }
        clearForm();
        loadProducts();
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    });

    document.getElementById('cancel-btn').addEventListener('click', clearForm);

    loadProducts();
  </script>
</body>
</html>
